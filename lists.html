<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>lists</title>
    <link href="styles.css" rel="stylesheet" type="text/css" />
</head>

<body>
    <h2> Ordered List </h2>
    <ol>
        <li> Home </li>
        <li> About us </li>
        <li> Contact Us</li>
    </ol>
    <h2> Unordered List </h2>
    <ul> 
        <li> Home </li>
        <li> About us </li>
        <li> Contact Us</li>

    </ul>
    <h2> Definition List </h2>
    <dl>
        <dt> Home </dt>
        <dd> Homepage about the website</dd>
        <dt> About us </dt>
        <dd> Contact numbers about the website </dd>
    </dl>
</body>

</html>
